services:
  - type: web
    name: pk-trades
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm db:migrate && pnpm start
    disk:
      name: pk-trades-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/pk_trades.db
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SYNC_TOKEN
        sync: false
      - key: TZ
        value: America/Chicago
