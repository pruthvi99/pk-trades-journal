[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "mkdir -p $(dirname $DATABASE_PATH) && pnpm db:migrate && exec ./node_modules/.bin/next start -H 0.0.0.0 -p ${PORT:-3000}"
healthcheckPath = "/login"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
